<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 변경 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    .field-error { border-color: #dc3545; }
    .field-error-msg { color: #dc3545; font-size: 0.875em; margin-top: 0.25rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
        </li>
        <li class="nav-item"><a class="nav-link" th:href="@{/user/password}">비밀번호 변경</a></li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex">
        <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header mb-4">
    <h4 class="fw-bold mb-0">비밀번호 변경</h4>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

            <div class="mb-3">
              <label for="currentPassword" class="form-label fw-semibold">현재 비밀번호 <span class="text-danger">*</span></label>
              <input type="password" id="currentPassword" th:field="*{currentPassword}" class="form-control"
                     th:classappend="${#fields.hasErrors('currentPassword')} ? 'field-error' : ''" placeholder="현재 비밀번호를 입력하세요">
              <div class="field-error-msg" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label fw-semibold">새 비밀번호 <span class="text-danger">*</span></label>
              <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                     th:classappend="${#fields.hasErrors('newPassword')} ? 'field-error' : ''" placeholder="새 비밀번호 (8자 이상)">
              <div class="field-error-msg" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label fw-semibold">새 비밀번호 확인 <span class="text-danger">*</span></label>
              <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                     th:classappend="${#fields.hasErrors('confirmPassword')} ? 'field-error' : ''" placeholder="새 비밀번호를 다시 입력하세요">
              <div class="field-error-msg" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">비밀번호 변경</button>
              <a th:href="@{/home}" class="btn btn-secondary">취소</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div class="text-center mt-4 mb-4">
  <p class="text-muted">
    <small>
      학번: 2171242 | 성명: 김혜성 | 실습 수행: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 a hh:mm:ss')}"></span>
    </small>
  </p>
</div>
</body>
</html>
